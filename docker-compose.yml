version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ghcr.io/${GITHUB_REPOSITORY:-nicoruedaa/olmanager}/backend:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWKS_URL=${SUPABASE_JWKS_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OLM_ALLOW_IMPORT=${OLM_ALLOW_IMPORT:-false}
      - OLM_IMPORT_SOURCE=${OLM_IMPORT_SOURCE}
      - RUST_LOG=${RUST_LOG:-info}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ghcr.io/${GITHUB_REPOSITORY:-nicoruedaa/olmanager}/frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend