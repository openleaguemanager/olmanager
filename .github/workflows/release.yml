name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to verify, for example 0.2.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  source-release:
    name: source-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version files and changelog
        shell: python
        run: |
          import json
          import pathlib
          import re
          import sys
          import tomllib

          version = "${{ steps.version.outputs.version }}"
          package_version = json.loads(pathlib.Path("package.json").read_text())["version"]
          cargo_version = tomllib.loads(pathlib.Path("src-tauri/Cargo.toml").read_text())["package"]["version"]
          tauri_version = json.loads(pathlib.Path("src-tauri/tauri.conf.json").read_text())["version"]
          changelog = pathlib.Path("CHANGELOG.md").read_text()

          versions = {
              "package.json": package_version,
              "src-tauri/Cargo.toml": cargo_version,
              "src-tauri/tauri.conf.json": tauri_version,
          }
          mismatches = [f"{path}={value}" for path, value in versions.items() if value != version]
          if mismatches:
              print("Version mismatch: " + ", ".join(mismatches), file=sys.stderr)
              sys.exit(1)
          if not re.search(rf"^## \[{re.escape(version)}\]", changelog, re.MULTILINE):
              print(f"CHANGELOG.md is missing a ## [{version}] section", file=sys.stderr)
              sys.exit(1)

      - name: Create source archive
        shell: bash
        run: |
          mkdir -p dist-release
          git archive --format=tar.gz --prefix="olmanager-${{ steps.version.outputs.version }}/" HEAD > "dist-release/olmanager-${{ steps.version.outputs.version }}-source.tar.gz"

      - name: Extract release notes
        shell: python
        run: |
          import pathlib
          import re

          version = "${{ steps.version.outputs.version }}"
          changelog = pathlib.Path("CHANGELOG.md").read_text()
          match = re.search(
              rf"^## \[{re.escape(version)}\].*?(?=^## \[|\Z)",
              changelog,
              re.MULTILINE | re.DOTALL,
          )
          notes = match.group(0).strip() if match else f"OLManager {version}"
          pathlib.Path("dist-release/RELEASE_NOTES.md").write_text(notes + "\n")

      - name: Record signing status
        shell: bash
        run: |
          cat > dist-release/SIGNING_STATUS.txt <<'EOF'
          Platform binaries are generated on GitHub-hosted runners.
          Update artifacts are signed with Tauri's minisign key if TAURI_SIGNING_PRIVATE_KEY is configured.
          Windows and macOS bundles are unsigned; macOS notarization is not enabled until maintainers configure signing/notarization secrets and document support policy.
          EOF

      - name: Generate source checksums
        shell: bash
        run: |
          cd dist-release
          sha256sum * > SHA256SUMS.txt

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: olmanager-${{ steps.version.outputs.version }}-source
          path: dist-release/
          if-no-files-found: error

      - name: Publish source assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist-release/* --clobber
          else
            gh release create "$TAG_NAME" dist-release/* --title "OLManager $VERSION" --notes-file dist-release/RELEASE_NOTES.md --target "$GITHUB_SHA"
          fi

  build-tauri:
    name: build-tauri (${{ matrix.platform }})
    needs: source-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-22.04
          - platform: macos
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri build

      - name: Collect bundle artifacts
        env:
          VERSION: ${{ needs.source-release.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        shell: python
        run: |
          import hashlib
          import pathlib
          import shutil
          import sys

          version = "${{ env.VERSION }}"
          platform = "${{ env.PLATFORM }}"
          bundle_dir = pathlib.Path("src-tauri/target/release/bundle")
          out_dir = pathlib.Path("dist-bundle")
          out_dir.mkdir(exist_ok=True)

          allowed_suffixes = (
              ".AppImage",
              ".deb",
              ".dmg",
              ".exe",
              ".msi",
              ".rpm",
              ".sig",
          )
          allowed_double_suffixes = (".app.tar.gz",)

          if not bundle_dir.exists():
              print(f"Missing Tauri bundle directory: {bundle_dir}", file=sys.stderr)
              sys.exit(1)

          copied = []
          for path in bundle_dir.rglob("*"):
              if not path.is_file():
                  continue
              name = path.name
              if not (name.endswith(allowed_suffixes) or name.endswith(allowed_double_suffixes)):
                  continue
              destination = out_dir / f"olmanager-{version}-{platform}-{name}"
              shutil.copy2(path, destination)
              copied.append(destination)

          if not copied:
              print(f"No distributable Tauri bundles found under {bundle_dir}", file=sys.stderr)
              sys.exit(1)

          checksum_file = out_dir / f"SHA256SUMS-{platform}.txt"
          checksum_file.write_text(
              "".join(
                  f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}\n"
                  for path in sorted(copied)
              )
          )

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: olmanager-${{ needs.source-release.outputs.version }}-${{ matrix.platform }}
          path: dist-bundle/
          if-no-files-found: error

      - name: Publish bundle assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.source-release.outputs.tag_name }}
        shell: bash
        run: gh release upload "$TAG_NAME" dist-bundle/* --clobber

  generate-update-manifest:
    name: Generate update manifest
    needs: [source-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: olmanager-${{ needs.source-release.outputs.version }}-*

      - name: Generate latest.json
        env:
          VERSION: ${{ needs.source-release.outputs.version }}
          TAG_NAME: ${{ needs.source-release.outputs.tag_name }}
        shell: python
        run: |
          import json
          import pathlib
          import re
          from datetime import datetime, timezone

          version = "${{ env.VERSION }}"
          tag_name = "${{ env.TAG_NAME }}"
          repo = "${{ github.repository }}"
          base_url = f"https://github.com/{repo}/releases/download/{tag_name}"

          platforms = {}
          artifacts_dir = pathlib.Path("all-artifacts")

          def read_signature(artifact_path):
              sig_path = pathlib.Path(str(artifact_path) + ".sig")
              if sig_path.exists():
                  return sig_path.read_text().strip()
              return ""

          # Find Windows .exe (NSIS installer for auto-update)
          exe_files = sorted(artifacts_dir.rglob("*-windows-*.exe"))
          for path in exe_files:
              if "setup" in path.name.lower():
                  sig = read_signature(path)
                  platforms["windows-x86_64"] = {
                      "url": f"{base_url}/{path.name}",
                      "signature": sig
                  }
                  break

          # Fallback: any .exe if no "setup" found
          if "windows-x86_64" not in platforms and exe_files:
              sig = read_signature(exe_files[0])
              platforms["windows-x86_64"] = {
                  "url": f"{base_url}/{exe_files[0].name}",
                  "signature": sig
              }

          # Find Linux .AppImage
          appimage_files = sorted(artifacts_dir.rglob("*-linux-*.AppImage"))
          if appimage_files:
              sig = read_signature(appimage_files[0])
              platforms["linux-x86_64"] = {
                  "url": f"{base_url}/{appimage_files[0].name}",
                  "signature": sig
              }

          # Find macOS .app.tar.gz (used by Tauri updater, NOT .dmg)
          mac_tarball_files = sorted(artifacts_dir.rglob("*-macos-*.app.tar.gz"))
          for path in mac_tarball_files:
              name = path.name
              sig = read_signature(path)
              if "aarch64" in name or "arm64" in name:
                  key = "darwin-aarch64"
              elif "x64" in name or "x86_64" in name:
                  key = "darwin-x86_64"
              else:
                  key = "darwin-aarch64"
              platforms[key] = {
                  "url": f"{base_url}/{name}",
                  "signature": sig
              }

          # Extract release notes from CHANGELOG.md
          changelog = pathlib.Path("CHANGELOG.md").read_text()
          match = re.search(
              rf"^## \[{re.escape(version)}\].*?(?=^## \[|\Z)",
              changelog,
              re.MULTILINE | re.DOTALL,
          )
          notes = match.group(0).strip() if match else f"OLManager {version}"

          pub_date = datetime.now(timezone.utc).isoformat()

          manifest = {
              "version": version,
              "notes": notes,
              "pub_date": pub_date,
              "platforms": platforms
          }

          pathlib.Path("latest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          print("Generated latest.json:")
          print(json.dumps(manifest, indent=2))

      - name: Publish update manifest
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.source-release.outputs.tag_name }}
        shell: bash
        run: gh release upload "$TAG_NAME" latest.json --clobber
